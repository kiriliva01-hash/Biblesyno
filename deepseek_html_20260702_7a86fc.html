    <script>
        // ==================== Service Worker (PWA) ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                const swCode = `
                    const CACHE_NAME = 'bible-v1';
                    const ASSETS = [
                        './',
                        'https://raw.githubusercontent.com/thiagobodruk/bible/refs/heads/master/json/ru_synodal.json'
                    ];

                    self.addEventListener('install', event => {
                        event.waitUntil(
                            caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS))
                        );
                    });

                    self.addEventListener('fetch', event => {
                        event.respondWith(
                            caches.match(event.request).then(cached => {
                                const network = fetch(event.request).then(response => {
                                    const clone = response.clone();
                                    caches.open(CACHE_NAME).then(cache => cache.put(event.request, clone));
                                    return response;
                                });
                                return cached || network;
                            })
                        );
                    });

                    self.addEventListener('activate', event => {
                        event.waitUntil(
                            caches.keys().then(keys => Promise.all(
                                keys.filter(key => key !== CACHE_NAME).map(key => caches.delete(key))
                            ))
                        );
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW registration failed:', err));
            });
        }

        // ==================== Основной код ====================
        function debug(msg) { console.log(msg); }

        const bibleBooks = {

            'Исх': { enAbbrev: 'Ex', enName: 'Exodus' },
            'Лев': { enAbbrev: 'Lev', enName: 'Leviticus' },

            'Руфь': { enAbbrev: 'Ruth', enName: 'Ruth' },
            '1Цар': { enAbbrev: '1Sam', enName: '1 Samuel' },
            '2Цар': { enAbbrev: '2Sam', enName: '2 Samuel' },

            'Иуд': { enAbbrev: 'Jude', enName: 'Jude' },
            'Рим': { enAbbrev: 'Rom', enName: 'Romans' },
            '1Кор': { enAbbrev: '1Cor', enName: '1 Corinthians' },
            '2Кор': { enAbbrev: '2Cor', enName: '2 Corinthians' },
            'Гал': { enAbbrev: 'Gal', enName: 'Galatians' },
            'Еф': { enAbbrev: 'Eph', enName: 'Ephesians' },
            'Флп': { enAbbrev: 'Phil', enName: 'Philippians' },
            'Кол': { enAbbrev: 'Col', enName: 'Colossians' },
            '1Фес': { enAbbrev: '1Thess', enName: '1 Thessalonians' },
            '2Фес': { enAbbrev: '2Thess', enName: '2 Thessalonians' },
            '1Тим': { enAbbrev: '1Tim', enName: '1 Timothy' },
            '2Тим': { enAbbrev: '2Tim', enName: '2 Timothy' },
            'Тит': { enAbbrev: 'Titus', enName: 'Titus' },
            'Флм': { enAbbrev: 'Phlm', enName: 'Philemon' },
            'Евр': { enAbbrev: 'Heb', enName: 'Hebrews' },
            'Откр': { enAbbrev: 'Rev', enName: 'Revelation' }
        };

        function getBookEnName(book) {
            const abbrev = book.abbrev || '';
            if (bibleBooks[abbrev]) return bibleBooks[abbrev].enName;
            return book.name || book.book || book.title || abbrev || 'Unknown';
        }

        function getBookEnAbbrev(book) {
            const abbrev = book.abbrev || '';
            if (bibleBooks[abbrev]) return bibleBooks[abbrev].enAbbrev;
            return abbrev || 'Unknown';
        }

        function findBibleBooks(data) {
            const knownAbbrevs = Object.keys(bibleBooks);
            if (Array.isArray(data)) {
                const filtered = data.filter(item => item.abbrev && knownAbbrevs.includes(item.abbrev));
                if (filtered.length > 0) return filtered;
                const byName = data.filter(item => {
                    const name = (item.name || item.book || '').toLowerCase();
                    return Object.values(bibleBooks).some(info => name.includes(info.enName.toLowerCase()));
                });
                if (byName.length > 0) return byName;
                return data;
            }
            if (typeof data === 'object' && data !== null) {
                if (data.books) return findBibleBooks(data.books);
                if (data.bible) return findBibleBooks(data.bible);
                for (const key of Object.keys(data)) {
                    if (Array.isArray(data[key])) return findBibleBooks(data[key]);
                }
            }
            return [];
        }

        function getChapters(book) {
            if (book.chapters && Array.isArray(book.chapters)) return book.chapters;
            if (book.verses && Array.isArray(book.verses)) return [book.verses];
            if (book.text && Array.isArray(book.text)) return book.text;
            for (const key of Object.keys(book)) {
                if (Array.isArray(book[key]) && key !== 'abbrev' && key !== 'name') {
                    return book[key];
                }
            }
            return [];
        }

        function getVerseText(verse) {
            if (typeof verse === 'string') return verse;
            if (verse.text) return verse.text;
            if (verse.content) return verse.content;
            if (verse.v) return verse.v;
            return String(verse);
        }

        function getVerseNumber(verse, index) {
            if (typeof verse === 'string') return index + 1;
            if (verse.verse) return verse.verse;
            if (verse.number) return verse.number;
            if (verse.vnum) return verse.vnum;
            return index + 1;
        }

        let allBooks = [];
        let currentBookIndex = 0;
        let currentChapter = 0;
        let searchIndex = [];
        const highlights = new Map();

        function highlightKey(bookIdx, chapterIdx, verseIdx) {
            return `${bookIdx}_${chapterIdx}_${verseIdx}`;
        }

        function getHighlightColor(bookIdx, chapterIdx, verseIdx) {
            return highlights.get(highlightKey(bookIdx, chapterIdx, verseIdx)) || '';
        }

        function setHighlightColor(bookIdx, chapterIdx, verseIdx, color) {
            const key = highlightKey(bookIdx, chapterIdx, verseIdx);
            if (color && color !== 'none') {
                highlights.set(key, color);
            } else {
                highlights.delete(key);
            }
            const elements = document.querySelectorAll(`.verse[data-book="${bookIdx}"][data-chapter="${chapterIdx}"][data-verse="${verseIdx}"]`);
            elements.forEach(el => {
                el.style.backgroundColor = color === 'none' ? '' : color;
            });
        }

        function buildIndex() {
            searchIndex = [];
            allBooks.forEach((book, bookIndex) => {
                const chapters = getChapters(book);
                chapters.forEach((chapter, chapterIndex) => {
                    if (!Array.isArray(chapter)) return;
                    chapter.forEach((verse, verseIndex) => {
                        const text = getVerseText(verse).toLowerCase();
                        searchIndex.push({ bookIndex, chapterIndex, verseIndex, text });
                    });
                });
            });
        }

        async function loadBible() {
            try {
                const url = 'https://raw.githubusercontent.com/thiagobodruk/bible/refs/heads/master/json/ru_synodal.json';
                const response = await fetch(url);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                allBooks = findBibleBooks(data);
                if (allBooks.length === 0) throw new Error('Не удалось найти книги в JSON');
                buildIndex();
                renderBookButtons();
                selectBook(0);
            } catch (error) {
                debug('Ошибка: ' + error.message);
                let helpMsg = '';
                if (location.protocol === 'file:') {
                    helpMsg = `<div class="help-box"><strong>Вы открыли файл локально (file://).</strong><br>Запустите локальный сервер:<br><code>python3 -m http.server 8000</code> (Python)<br>или <code>npx serve .</code> (Node.js)<br>Затем откройте <code>http://localhost:8000</code></div>`;
                }
                document.getElementById('bibleText').innerHTML = `
                    <div class="error">
                        <h3>Ошибка загрузки</h3>
                        <p>${error.message}</p>
                        ${helpMsg}
                    </div>`;
            }
        }

        function renderBookButtons() {
            const bookList = document.getElementById('bookList');
            bookList.innerHTML = '';
            allBooks.forEach((book, index) => {
                const btn = document.createElement('button');
                btn.className = 'book-btn';
                btn.textContent = getBookEnName(book);
                btn.title = getBookEnAbbrev(book);
                btn.onclick = () => selectBook(index);
                bookList.appendChild(btn);
            });
        }

        function selectBook(index) {
            currentBookIndex = index;
            currentChapter = 0;
            document.querySelectorAll('.book-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            renderChapterButtons();
            const chapters = getChapters(allBooks[index]);
            if (chapters.length > 0) {
                selectChapter(0);
            } else {
                document.getElementById('bibleText').innerHTML = '<div class="error">В книге не найдено глав</div>';
            }
        }

        function renderChapterButtons() {
            const chapterNav = document.getElementById('chapterNav');
            const chapters = getChapters(allBooks[currentBookIndex]);
            chapterNav.style.display = 'flex';
            chapterNav.innerHTML = '';
            for (let i = 0; i < chapters.length; i++) {
                const btn = document.createElement('button');
                btn.className = 'chapter-btn';
                btn.textContent = i + 1;
                btn.onclick = () => selectChapter(i);
                chapterNav.appendChild(btn);
            }
        }

        function selectChapter(index) {
            currentChapter = index;
            document.querySelectorAll('.chapter-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            renderVerses();
        }

        function renderVerses() {
            const bibleText = document.getElementById('bibleText');
            const book = allBooks[currentBookIndex];
            const chapters = getChapters(book);
            const chapter = chapters[currentChapter];
            if (!chapter || !Array.isArray(chapter) || chapter.length === 0) {
                bibleText.innerHTML = '<div class="error">Глава пуста или не найдена</div>';
                return;
            }
            let html = `<h2>${getBookEnName(book)} — Chapter ${currentChapter + 1}</h2>`;
            chapter.forEach((verse, verseIndex) => {
                const verseNum = getVerseNumber(verse, verseIndex);
                const verseText = getVerseText(verse);
                const color = getHighlightColor(currentBookIndex, currentChapter, verseIndex);
                const style = color ? `style="background-color:${color}"` : '';
                html += `
                    <div class="verse" data-book="${currentBookIndex}" data-chapter="${currentChapter}" data-verse="${verseIndex}" ${style}>
                        <span class="verse-num">${verseNum}</span>${escapeHtml(verseText)}
                    </div>`;
            });
            bibleText.innerHTML = html;
        }

        const MAX_SEARCH_RESULTS = 200;
        const searchInput = document.getElementById('searchInput');
        let debounceTimer;

        function performSearch(query) {
            const bibleText = document.getElementById('bibleText');
            if (query === '') {
                if (allBooks.length > 0) renderVerses();
                return;
            }

            const matches = searchIndex.filter(item => item.text.includes(query));
            const totalFound = matches.length;

            if (totalFound === 0) {
                bibleText.innerHTML = '<div class="loading">Ничего не найдено</div>';
                return;
            }

            const limited = matches.slice(0, MAX_SEARCH_RESULTS);
            let html = `<h2>Результаты поиска: «${escapeHtml(query)}» (${totalFound})</h2>`;
            if (totalFound > MAX_SEARCH_RESULTS) {
                html += `<p class="search-info">Показаны первые ${MAX_SEARCH_RESULTS} из ${totalFound} совпадений</p>`;
            }

            for (const r of limited) {
                const book = allBooks[r.bookIndex];
                const chapter = getChapters(book)[r.chapterIndex];
                const verse = chapter[r.verseIndex];
                const verseNum = getVerseNumber(verse, r.verseIndex);
                const verseText = getVerseText(verse);
                const enAbbrev = getBookEnAbbrev(book);
                const color = getHighlightColor(r.bookIndex, r.chapterIndex, r.verseIndex);
                const style = color ? `style="background-color:${color}"` : '';
                html += `
                    <div class="verse" data-book="${r.bookIndex}" data-chapter="${r.chapterIndex}" data-verse="${r.verseIndex}" ${style}>
                        <span class="verse-num">${enAbbrev} ${r.chapterIndex + 1}:${verseNum}</span>
                        ${highlightText(verseText, query)}
                    </div>`;
            }

            bibleText.innerHTML = html;
        }

        searchInput.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            const query = this.value.trim().toLowerCase();
            debounceTimer = setTimeout(() => performSearch(query), 500);
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function highlightText(text, query) {
            const escaped = escapeHtml(text);
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escaped.replace(regex, '<mark>$1</mark>');
        }

        // Модальное окно
        const modalOverlay = document.getElementById('verseModal');
        const modalRef = document.getElementById('modalRef');
        const modalText = document.getElementById('modalText');
        const closeModalBtn = document.getElementById('closeModal');
        let currentModalVerse = null;

        function showModal(bookIndex, chapterIndex, verseIndex) {
            const book = allBooks[bookIndex];
            const chapters = getChapters(book);
            const chapter = chapters[chapterIndex];
            const verse = chapter[verseIndex];
            const verseNum = getVerseNumber(verse, verseIndex);
            const verseText = getVerseText(verse);
            const enName = getBookEnName(book);
            const enAbbrev = getBookEnAbbrev(book);

            modalRef.textContent = `${enName} (${enAbbrev} ${chapterIndex + 1}:${verseNum})`;
            modalText.textContent = verseText;
            const color = getHighlightColor(bookIndex, chapterIndex, verseIndex);
            modalText.style.backgroundColor = color || '#fcf8f0';

            document.querySelectorAll('.color-btn').forEach(btn => {
                const btnColor = btn.dataset.color;
                if (btnColor === color || (btnColor === 'none' && !color)) {
                    btn.classList.add('active-color');
                } else {
                    btn.classList.remove('active-color');
                }
            });

            currentModalVerse = { bookIndex, chapterIndex, verseIndex };
            modalOverlay.classList.add('active');
        }

        function hideModal() {
            modalOverlay.classList.remove('active');
            currentModalVerse = null;
        }

        closeModalBtn.addEventListener('click', hideModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) hideModal();
        });

        document.getElementById('bibleText').addEventListener('click', (e) => {
            const verseDiv = e.target.closest('.verse');
            if (!verseDiv) return;
            const bookIdx = parseInt(verseDiv.dataset.book, 10);
            const chapterIdx = parseInt(verseDiv.dataset.chapter, 10);
            const verseIdx = parseInt(verseDiv.dataset.verse, 10);
            if (!isNaN(bookIdx) && !isNaN(chapterIdx) && !isNaN(verseIdx)) {
                showModal(bookIdx, chapterIdx, verseIdx);
            }
        });

        document.querySelector('.palette').addEventListener('click', (e) => {
            const colorBtn = e.target.closest('.color-btn');
            if (!colorBtn || !currentModalVerse) return;
            const color = colorBtn.dataset.color;
            const { bookIndex, chapterIndex, verseIndex } = currentModalVerse;

            setHighlightColor(bookIndex, chapterIndex, verseIndex, color === 'none' ? '' : color);
            modalText.style.backgroundColor = color === 'none' ? '#fcf8f0' : color;
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active-color'));
            colorBtn.classList.add('active-color');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                hideModal();
            }
        });

        loadBible();
    </script>
</body>
</html>
